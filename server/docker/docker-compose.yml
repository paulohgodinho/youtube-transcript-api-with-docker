version: '3.8'

services:
  youtube-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: youtube-transcript-api
    ports:
      - "8080:8080"
    environment:
      - PYTHON_BIN=python3
      - SERVER_PORT=8080
      - REQUEST_TIMEOUT=30s
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
